plugins { id 'com.android.application' }

android {
    namespace 'com.virtualbeehive.expensekeeper'
    compileSdk 35

    defaultConfig {
        applicationId 'com.virtualbeehive.expensekeeper'
        minSdk 26
        targetSdk 34
        versionCode 6
        versionName '1.6'
    }

    signingConfigs {
        vbdebug {
            storeFile file('keystore/vb-expense-debug.jks')
            storePassword 'virtualbeehive'
            keyAlias 'vbexpense'
            keyPassword 'virtualbeehive'
        }
    }
    buildTypes {
        debug { signingConfig signingConfigs.vbdebug }
        release { signingConfig signingConfigs.vbdebug; minifyEnabled false }
    }
}


configurations.configureEach {
    resolutionStrategy.force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}

dependencies {
    implementation 'com.google.android.gms:play-services-auth:21.2.0'
    implementation 'com.google.mlkit:text-recognition:16.0.1'
    implementation 'androidx.core:core:1.13.1'
    implementation 'com.google.zxing:core:3.5.3'
}
